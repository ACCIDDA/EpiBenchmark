[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "EpiBench"
version = "0.0.1"
description = "Benchmark tool to evaluate model performance"
readme = "README.md"
requires-python = ">=3.8, <=3.11"
dependencies = [
    "matplotlib>=3.10.9",
    "numpy>=2.4.6",
    "pandas>=3.0.3",
    "plotly>=6.7.0",
    "PyYAML>=6.0",
    "seaborn>=0.13.2",
    "xarray>=2026.4.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
score-forecasts = "epibench.main:main"